# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
name: cow-programmatic-orders
description: CoW Protocol Programmatic Orders Indexer — Composable CoW order tracking across all supported chains

contracts:
  - name: ComposableCoW
    abi_file_path: abis/ComposableCoW.json
    handler: src/handlers/ComposableCoW.ts
    events:
      - event: ConditionalOrderCreated
      - event: MerkleRootSet

chains:
  - id: 1 # Ethereum Mainnet
    start_block: 17883049
    contracts:
      - name: ComposableCoW
        address: "0xfdaFc9d1902f4e0b84f65F49f244b32b31013b74"

  - id: 100 # Gnosis Chain
    start_block: 29380000
    contracts:
      - name: ComposableCoW
        address: "0xfdaFc9d1902f4e0b84f65F49f244b32b31013b74"

  - id: 42161 # Arbitrum One
    start_block: 130000000
    contracts:
      - name: ComposableCoW
        address: "0xfdaFc9d1902f4e0b84f65F49f244b32b31013b74"

  - id: 8453 # Base
    start_block: 7000000
    contracts:
      - name: ComposableCoW
        address: "0xfdaFc9d1902f4e0b84f65F49f244b32b31013b74"

  - id: 11155111 # Sepolia (testnet)
    start_block: 4500000
    contracts:
      - name: ComposableCoW
        address: "0xfdaFc9d1902f4e0b84f65F49f244b32b31013b74"

field_selection:
  transaction_fields:
    - hash
    - from
