# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
name: cow-programmatic-orders
description: CoW Protocol Programmatic Orders Indexer — Composable CoW, COWShed ownership, and GPv2 trade tracking

contracts:
  - name: ComposableCoW
    abi_file_path: abis/ComposableCoW.json
    handler: src/handlers/ComposableCoW.ts
    events:
      - event: ConditionalOrderCreated
      - event: MerkleRootSet

  - name: COWShedFactory
    abi_file_path: abis/COWShedFactory.json
    handler: src/handlers/COWShedFactory.ts
    events:
      - event: COWShedBuilt

  - name: GPv2Settlement
    abi_file_path: abis/GPv2Settlement.json
    handler: src/handlers/GPv2Settlement.ts
    events:
      - event: Trade

chains:
  - id: 1 # Ethereum Mainnet
    start_block: 17883049
    contracts:
      - name: ComposableCoW
        address: "0xfdaFc9d1902f4e0b84f65F49f244b32b31013b74"
      - name: COWShedFactory
        address: "0x312f92fe5f1710408b20d52a374fa29e099cfa86"
      - name: GPv2Settlement
        address: "0x9008D19f58AAbD9eD0D60971565AA8510560ab41"

